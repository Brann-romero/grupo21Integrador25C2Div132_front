<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consultar producto ID-</title>
</head>

<body>
    <main>
        <h1>Consultar producto</h1>

        <form id="getProduct-form">
            <label for="idProd">Id del producto</label>
            <input type="number" name="idProd" id="idProd" required>
            <input type="submit" value="Consultar producto">
        </form>
        <hr>
        <section id="products-container">
            <ul id="products-list"></ul>
        </section>
    </main>
    <script>

        let productList = document.getElementById("products-list");//variable que vamos a usar para mostrar el producto
        let getProductForm = document.getElementById("getProduct-form");//variable para el formulario
        let url = "http://localhost:3000";

        getProductForm.addEventListener("submit", async (event) => { //"submit escucha el evento de enviar el formulario" 
            event.preventDefault();//previene que se recargue la pagina al enviar el formulario

            let formData = new FormData(event.target);//event.target es el formulario y FormData agarra el valor pero no como objeto
            let data = Object.fromEntries(formData.entries());//lo convierte en objeto
            let idProd = data.idProd; //Ahora q mi form es objeto puedo guardar el id en una variable
            console.log(idProd);

            console.log(`Haciendo una peticion GET a la url ${url}/productos/${idProd}`);

            let response = await fetch(`${url}/productos/${idProd}/`);
            let datos = await response.json(); //convierte el contenido en un objeto JavaScript

            if (response.ok) {//si la respuesta es correcta

                let product = datos.payload[0] //Para extraer la respuesta payload (el objeto)
                showProduct(product); //llama a la funcion showProduct para mostrar el producto en la pagina

            } else {
                console.log(datos.message);//si no es correcta muestra el mensaje de error en la consola
                showError(datos.message)//llama a la funcion showError para mostrar el mensaje en la pagina
            }
        });

        function showProduct(product) {
            let htmlProduct = `
        <li class="li-product">
            <img class="product-img" src="${product.img}" alt="${product.nombre}">
            <p>Id : ${product.id} | Nombre: ${product.nombre} | Precio: ${product.precio}</p>
        </li>
    `;
            productList.innerHTML = htmlProduct;
        }

        function showError(message) { //funcion para mostrar el mensaje de error en la pagina
            productList.innerHTML = `
                <li class="message-error">
                    <strong>${message}</strong>
                </li>
            `;
        }
    </script>
</body>

</html>
