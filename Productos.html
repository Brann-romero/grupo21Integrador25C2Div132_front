<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos – Autoservicio</title>
    <link rel="stylesheet" href="css/productos.css">
</head>
<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">🎸</div>

        <h1 class="titulo-app">AutoServicio Pro Music</h1>

        <div class="nombre-alumno">Brandon Ezequiel Romero</div>

        <nav class="nav">
            <a href="inicio.html">Inicio</a>
            <a class="activo" href="productos.html">Productos</a>
            <a href="ticket.html">Ticket</a>
        </nav>
    </header>

    <!-- BUSCADOR -->
    <section class="buscador">
        <input id="input-buscar" type="text" placeholder="Buscar por nombre o categoría...">
    </section>

    <!-- GUITARRAS -->
    <section class="categoria">
        <h2>Guitarras</h2>

        <div class="carrusel">
            <button class="flecha izquierda" data-target="lista-guitarras">&#8249;</button>

            <div class="lista-productos" id="lista-guitarras"></div>

            <button class="flecha derecha" data-target="lista-guitarras">&#8250;</button>
        </div>
    </section>

    <!-- PROTESIS -->
    <section class="categoria">
        <h2>Prótesis de mano</h2>

        <div class="carrusel">
            <button class="flecha izquierda" data-target="lista-protesis">&#8249;</button>

            <div class="lista-productos" id="lista-protesis"></div>

            <button class="flecha derecha" data-target="lista-protesis">&#8250;</button>
        </div>
    </section>

    <script src="js/productos.js"></script>
</body>
</html>
